<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamentos - Controle Leo Eslavo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f8ff;
      --bg-soft: #edf3ff;
      --card: #ffffff;
      --line: #dbe5ff;
      --text: #0f1b4d;
      --muted: #6170a2;
      --primary: #002ad6;
      --primary-soft: #24aceb;
      --shadow: 0 10px 26px rgba(14, 32, 110, 0.1);
      --danger: #b65021;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Manrope, sans-serif;
      color: var(--text);
      background:
        radial-gradient(850px 480px at 8% -10%, rgba(0, 42, 214, 0.12), transparent 56%),
        radial-gradient(680px 360px at 98% 0%, rgba(36, 172, 235, 0.16), transparent 48%),
        linear-gradient(160deg, var(--bg), var(--bg-soft));
      min-height: 100vh;
      padding: 18px;
    }

    .app { max-width: 980px; margin: 0 auto; display: grid; gap: 12px; }

    .top,
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .top {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .nav { display: flex; gap: 8px; align-items: center; }

    .nav a {
      text-decoration: none;
      border: 1px solid #c8d7ff;
      background: #eef3ff;
      color: #1b3fcf;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nav a.active { background: #002ad6; color: #fff; border-color: #002ad6; }

    h1 {
      margin: 0;
      font-family: Sora, sans-serif;
      font-size: clamp(1.05rem, 2vw, 1.4rem);
      letter-spacing: -0.02em;
    }

    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

    @media (min-width: 920px) {
      .grid { grid-template-columns: 360px 1fr; }
    }

    .card { padding: 14px; }

    h2 {
      margin: 0 0 12px;
      font-family: Sora, sans-serif;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }

    .form { display: grid; gap: 9px; }

    label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #cdd9ff;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 0.92rem;
      background: #fafcff;
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: #84a2ff;
      box-shadow: 0 0 0 3px rgba(0, 42, 214, 0.13);
    }

    .btns { display: flex; gap: 8px; }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.83rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(90deg, #002ad6, #24aceb);
      color: #fff;
      flex: 1;
    }

    .ghost {
      border-color: #ccd8ff;
      background: #f2f6ff;
      color: #1b3fcf;
    }

    .danger {
      border-color: #ffcbb6;
      background: #fff2ea;
      color: var(--danger);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      border: 1px solid #dde6ff;
      border-radius: 12px;
      background: #fbfdff;
      padding: 10px;
    }

    .kpi .k {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    .kpi .v {
      font-family: Sora, sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }

    th, td {
      text-align: left;
      padding: 9px 8px;
      border-bottom: 1px solid #e8efff;
    }

    th {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td:last-child { text-align: right; }

    .empty {
      color: var(--muted);
      font-size: 0.82rem;
      padding: 10px 2px;
    }

    .remove-btn {
      border-color: #ffd6c6;
      background: #fff4ed;
      color: #b65021;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 0.74rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="nav">
        <a href="./index.html">Dashboard</a>
        <a class="active" href="./lancamentos.html">Lançamentos</a>
      </div>
      <h1>Controle Leo Eslavo</h1>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Novo Lançamento</h2>
        <form id="formLancamento" class="form">
          <div>
            <label for="pedido">Pedido</label>
            <input id="pedido" type="text" placeholder="Ex.: PED-1024" required>
          </div>
          <div>
            <label for="valor">Valor (R$)</label>
            <input id="valor" type="number" min="0" step="0.01" placeholder="0,00" required>
          </div>
          <div>
            <label for="data">Data</label>
            <input id="data" type="date" required>
          </div>
          <div>
            <label for="obs">Observação (opcional)</label>
            <input id="obs" type="text" placeholder="Cliente, canal, etc.">
          </div>
          <div class="btns">
            <button class="primary" type="submit">Adicionar</button>
            <button class="ghost" type="reset">Limpar</button>
          </div>
        </form>
      </article>

      <article class="card">
        <h2>Lista de Pedidos</h2>
        <div class="summary">
          <div class="kpi"><div class="k">Total de pedidos</div><div id="totalPedidos" class="v">0</div></div>
          <div class="kpi"><div class="k">Total realizado</div><div id="totalValor" class="v">R$ 0,00</div></div>
        </div>
        <div class="btns" style="margin-bottom:10px;">
          <button id="btnLimparTudo" class="danger" type="button">Apagar todos os lançamentos</button>
        </div>
        <div id="tableWrap"></div>
      </article>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "leo_lancamentos";

    function brl(value) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(value || 0);
    }

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const items = JSON.parse(raw);
        return Array.isArray(items) ? items : [];
      } catch {
        return [];
      }
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function renderTable() {
      const items = loadItems();
      const totalValor = items.reduce((acc, item) => acc + num(item.valor), 0);
      document.getElementById("totalPedidos").textContent = String(items.length);
      document.getElementById("totalValor").textContent = brl(totalValor);

      const wrap = document.getElementById("tableWrap");
      if (!items.length) {
        wrap.innerHTML = '<div class="empty">Nenhum pedido lançado ainda.</div>';
        return;
      }

      const rows = items.map((item, idx) => `
        <tr>
          <td>${item.pedido}</td>
          <td>${item.data || "-"}</td>
          <td>${item.obs || "-"}</td>
          <td>${brl(num(item.valor))}</td>
          <td><button class="remove-btn" data-index="${idx}">Remover</button></td>
        </tr>
      `).join("");

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Data</th>
              <th>Observação</th>
              <th>Valor</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      wrap.querySelectorAll(".remove-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.getAttribute("data-index"));
          const next = loadItems();
          next.splice(i, 1);
          saveItems(next);
          renderTable();
        });
      });
    }

    function setupDefaults() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      document.getElementById("data").value = `${yyyy}-${mm}-${dd}`;
    }

    document.getElementById("formLancamento").addEventListener("submit", (ev) => {
      ev.preventDefault();
      const pedido = document.getElementById("pedido").value.trim();
      const valor = num(document.getElementById("valor").value);
      const data = document.getElementById("data").value;
      const obs = document.getElementById("obs").value.trim();

      if (!pedido || valor <= 0 || !data) return;

      const items = loadItems();
      items.unshift({ pedido, valor, data, obs });
      saveItems(items);

      document.getElementById("pedido").value = "";
      document.getElementById("valor").value = "";
      document.getElementById("obs").value = "";
      setupDefaults();
      renderTable();
    });

    document.getElementById("btnLimparTudo").addEventListener("click", () => {
      const ok = window.confirm("Tem certeza que deseja apagar todos os lançamentos?");
      if (!ok) return;
      saveItems([]);
      renderTable();
    });

    setupDefaults();
    renderTable();
  </script>
</body>
</html>
